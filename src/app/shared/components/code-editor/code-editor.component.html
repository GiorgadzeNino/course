<div class="code-editor-container" [class.editor-only]="!showPreviewPanel" [class.preview-only]="!showEditorPanel">
  @if (showEditorPanel) {
  <div class="editor-panel">
    <div class="editor-header">
      <span>{{ hasFiles ? activeFileName : editorTitle }}</span>
    </div>
    @if (hasFiles) {
    <div class="file-tabs">
      @for (file of files; track file.name; let i = $index) {
      <button type="button" class="file-tab" [class.active]="i === normalizedActiveFileIndex" (click)="onSelectFile(i)">
        {{ file.name }}
      </button>
      }
    </div>
    }
    <div class="editor-content">
      <textarea class="code-editor" [value]="editorValue" (input)="onCodeChange($any($event.target).value)"
        [readOnly]="!editable" placeholder="ჩაწერეთ კოდი..."></textarea>
    </div>
  </div>
  }

  @if (showPreviewPanel) {
  <div class="preview-panel">
    <div class="preview-header">
      <span>{{ previewTitle }}</span>
    </div>
    <div class="preview-content">
      <div class="preview-browser">
        <div class="browser-controls">
          <span class="browser-dot"></span>
          <span class="browser-dot"></span>
          <span class="browser-dot"></span>
        </div>
        <div class="browser-content">
          <ng-content></ng-content>
        </div>
      </div>
    </div>
  </div>
  }
</div>
